<div class="garage">
  <header class="hero">
    <p class="hero__eyebrow">Festival Garage</p>
    <h1 class="hero__title">Collective Horizon <span class="hero__accent">6</span></h1>

    <div class="hero__stats">
      <div class="stat">
        <span class="stat__num">{{ ownedCount() }}<span class="stat__den">/ {{ totalCars() }}</span></span>
        <span class="stat__label">auto in garage</span>
      </div>
      <div class="progress" role="progressbar" [attr.aria-valuenow]="completion()">
        <div class="progress__fill" [style.width.%]="completion()"></div>
        <span class="progress__pct">{{ completion() }}%</span>
      </div>
    </div>
  </header>

  <app-filter-bar
    [types]="availableTypes()"
    [active]="activeFilter()"
    (filterChange)="onFilterChange($event)"
  />

  @if (loading()) {
    <p class="garage__status">Caricamento catalogo…</p>
  } @else if (displayedCars().length === 0) {
    <p class="garage__status">Nessuna auto trovata per questo filtro.</p>
  } @else {
    <div #gridContainer class="garage__grid" [style.--row-count]="rowCount()">
      @for (car of displayedCars(); track car.id) {
        <app-car-card [car]="car" (toggle)="onToggleOwned(car.id)" />
      }
    </div>
  }
</div>
